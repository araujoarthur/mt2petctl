<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>araujoarthurr's MT2 Pet Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:          #0b0d14;
    --card-bg:     #141720;
    --card-border: #ffffff14;
    --text:        #e8e6f0;
    --muted:       #6b6f87;
    --accent:      #f0c040;

    --common:    #9ca3af;
    --uncommon:  #4ade80;
    --rare:      #60a5fa;
    --epic:      #c084fc;
    --legendary: #fbbf24;
    --mythic:    #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fredoka', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, #1a1f3a 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 4rem 2rem 3rem;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 1.5rem auto 0;
  }

  .owner-tag {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    opacity: 0.9;
  }

  h1 {
    font-family: 'Lilita One', cursive;
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 1.1;
    color: var(--text);
    text-shadow: 0 0 40px #6366f140, 0 0 80px #6366f120;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 1rem;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── GRID ── */
  .catalog {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 2rem 5rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
  }

  @media (max-width: 1100px) { .catalog { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 760px)  { .catalog { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px)  { .catalog { grid-template-columns: 1fr; } }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: #ffffff28;
    box-shadow: 0 16px 40px #00000060;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1)  { animation-delay: 0.05s }
  .card:nth-child(2)  { animation-delay: 0.10s }
  .card:nth-child(3)  { animation-delay: 0.15s }
  .card:nth-child(4)  { animation-delay: 0.20s }
  .card:nth-child(5)  { animation-delay: 0.25s }
  .card:nth-child(6)  { animation-delay: 0.30s }
  .card:nth-child(7)  { animation-delay: 0.35s }
  .card:nth-child(8)  { animation-delay: 0.40s }

  /* ── CARD ICON ── */
  .card-icon {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0f18;
    border-bottom: 1px solid var(--card-border);
    position: relative;
    overflow: hidden;
  }

  .card-icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 100%, var(--active-glow, var(--glow)) 0%, transparent 70%);
    opacity: 0.15;
    transition: opacity 0.3s ease, background 0.3s ease;
  }

  .card-icon.glow-active::before { opacity: 0.45; }

  .card-icon img {
    width: 70%;
    height: 70%;
    object-fit: contain;
    position: relative;
    z-index: 1;
  }

  /* ── CARD BODY ── */
  .card-body { padding: 1rem 1.1rem 1.2rem; }

  .card-name {
    font-family: 'Lilita One', cursive;
    font-size: 1.3rem;
    color: var(--text);
    margin-bottom: 0.9rem;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── RARITY ROWS ── */
  .rarity-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.3rem 0;
    border-bottom: 1px solid #ffffff08;
    font-size: 0.78rem;
  }

  .rarity-row:last-child { border-bottom: none; }

  .rarity-label {
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.68rem;
  }

  .rarity-label.common    { color: var(--common); }
  .rarity-label.uncommon  { color: var(--uncommon); }
  .rarity-label.rare      { color: var(--rare); }
  .rarity-label.epic      { color: var(--epic); }
  .rarity-label.legendary { color: var(--legendary); }
  .rarity-label.mythic    { color: var(--mythic); }

  .rarity-qty { display: flex; gap: 0.6rem; }

  .qty-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 30px;
  }

  .qty-chip .val {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .qty-chip .lbl {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .val.positive {
    color: #00ffaa;
    text-shadow: 0 0 8px #00ffaa99;
    font-weight: 700;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid #ffffff08;
  }

  /* ── SORT BAR ── */
  .sort-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .sort-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .sort-btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .sort-btn:hover { color: var(--text); border-color: #ffffff28; }
  .sort-btn.active { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <p class="owner-tag">araujoarthurr</p>
  <h1>Miners Tycoon 2<br /><span>Pet Catalog</span></h1>
  <p class="subtitle">{{ pet_count }} pets tracked &nbsp;·&nbsp; last updated {{ last_updated }}</p>
</header>

{% block content %}{% endblock %}

<footer>
  generated by mt2petctl &nbsp;·&nbsp; araujoarthurr
</footer>

<script>
const RARITY_COLORS = {
  common:    '#9ca3af',
  uncommon:  '#4ade80',
  rare:      '#60a5fa',
  epic:      '#c084fc',
  legendary: '#fbbf24',
  mythic:    '#f87171',
};

// rarity glow on hover
document.querySelectorAll('.card').forEach(card => {
  const icon = card.querySelector('.card-icon');
  card.querySelectorAll('.rarity-row').forEach(row => {
    const label = row.querySelector('.rarity-label');
    const rarity = [...label.classList].find(c => RARITY_COLORS[c]);
    if (!rarity) return;
    row.addEventListener('mouseenter', () => {
      icon.style.setProperty('--active-glow', RARITY_COLORS[rarity]);
      icon.classList.add('glow-active');
    });
    row.addEventListener('mouseleave', () => {
      icon.classList.remove('glow-active');
    });
  });
});

// sorting
const catalog = document.querySelector('.catalog');

function sortCards(sortKey, dir) {
  const cards = [...catalog.querySelectorAll('.card')];
  cards.sort((a, b) => {
    const aVal = sortKey === 'name' ? a.dataset.name : parseFloat(a.dataset[sortKey]);
    const bVal = sortKey === 'name' ? b.dataset.name : parseFloat(b.dataset[sortKey]);
    if (aVal < bVal) return dir === 'asc' ? -1 : 1;
    if (aVal > bVal) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  cards.forEach(c => catalog.appendChild(c));
}

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortCards(btn.dataset.sort, btn.dataset.dir);
  });
});

// default sort
sortCards('name', 'asc');
</script>

</body>
</html>
